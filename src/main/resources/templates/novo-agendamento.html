<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Agendamento - Agenda App</title>
    <link href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f9;
        }
        .form-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-top: 30px;
        }
        .form-title {
            border-left: 4px solid #4CAF50;
            padding-left: 15px;
            margin-bottom: 30px;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">📅 Agenda App</a>
        <div class="d-flex">
            <a href="/dashboard" class="btn btn-outline-light btn-sm">← Voltar</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="form-card">
                <h3 class="form-title">📝 Novo Agendamento</h3>

                <form id="formAgendamento">
                    <!-- Cliente -->
                    <div class="mb-3">
                        <label for="clienteNome" class="form-label">Nome do Cliente *</label>
                        <input type="text" class="form-control" id="clienteNome" name="clienteNome" required>
                    </div>

                    <div class="mb-3">
                        <label for="clienteTelefone" class="form-label">Telefone *</label>
                        <input type="tel" class="form-control" id="clienteTelefone" name="clienteTelefone" placeholder="(11) 99999-9999" required>
                    </div>

                    <!-- Profissional -->
                    <div class="mb-3">
                        <label for="profissionalId" class="form-label">Profissional *</label>
                        <select class="form-select" id="profissionalId" name="profissionalId" required>
                            <option value="">Selecione...</option>
                            <option th:each="p : ${profissionais}" th:value="${p.id}" th:text="${p.nome}"></option>
                        </select>
                    </div>

                    <!-- Serviço -->
                    <div class="mb-3">
                        <label for="servicoId" class="form-label">Serviço *</label>
                        <select class="form-select" id="servicoId" name="servicoId" required>
                            <option value="">Selecione...</option>
                            <option th:each="s : ${servicos}"
                                    th:value="${s.id}"
                                    th:text="${s.nome + ' - R$ ' + s.preco + ' (' + s.duracaoMinutos + 'min)'}">
                            </option>
                        </select>
                    </div>

                    <!-- Data e Hora -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="data" class="form-label">Data *</label>
                            <input type="date" class="form-control" id="data" name="data" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="hora" class="form-label">Hora *</label>
                            <input type="time" class="form-control" id="hora" name="hora" step="1800" required>
                        </div>
                    </div>

                    <!-- Observação -->
                    <div class="mb-3">
                        <label for="observacao" class="form-label">Observação</label>
                        <textarea class="form-control" id="observacao" name="observacao" rows="2"></textarea>
                    </div>

                    <!-- Alertas -->
                    <div id="alertErro" class="alert alert-danger d-none"></div>
                    <div id="alertSucesso" class="alert alert-success d-none"></div>

                    <!-- Botões -->
                    <div class="d-flex justify-content-end gap-2">
                        <a href="/dashboard" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary btn-submit">Salvar Agendamento</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Configura data mínima (hoje)
    const hoje = new Date().toISOString().split('T')[0];
    document.getElementById('data').min = hoje;

    // Formata telefone
    document.getElementById('clienteTelefone').addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length <= 11) {
            value = value.replace(/(\d{2})(\d)/, '($1) $2');
            value = value.replace(/(\d{5})(\d)/, '$1-$2');
            e.target.value = value;
        }
    });

    // Submit do formulário
    document.getElementById('formAgendamento').addEventListener('submit', async function(e) {
        e.preventDefault();

        // Esconde alerts
        document.getElementById('alertErro').classList.add('d-none');
        document.getElementById('alertSucesso').classList.add('d-none');

        // Pega os valores
        const profissionalId = document.getElementById('profissionalId').value;
        const servicoId = document.getElementById('servicoId').value;
        const clienteNome = document.getElementById('clienteNome').value;
        const clienteTelefone = document.getElementById('clienteTelefone').value;
        const data = document.getElementById('data').value;
        const hora = document.getElementById('hora').value;
        const observacao = document.getElementById('observacao').value;

        // Validações básicas
        if (!profissionalId || !servicoId || !clienteNome || !clienteTelefone || !data || !hora) {
            mostrarErro('Preencha todos os campos obrigatórios');
            return;
        }

        // Monta dataHora
        const dataHora = `${data}T${hora}:00`;

        // Monta objeto
        const agendamento = {
            empresa: { id: 1 },  // Temporário, depois pega da sessão
            profissional: { id: parseInt(profissionalId) },
            servico: { id: parseInt(servicoId) },
            clienteNome: clienteNome,
            clienteTelefone: clienteTelefone,
            dataHora: dataHora,
            observacao: observacao
        };

        try {
            const response = await fetch('/api/agendamentos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(agendamento)
            });

            if (response.ok) {
                const result = await response.json();
                mostrarSucesso(`Agendamento criado com sucesso! ID: ${result.id}`);
                document.getElementById('formAgendamento').reset();
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 2000);
            } else {
                const error = await response.json();
                mostrarErro(error.message || 'Erro ao criar agendamento');
            }
        } catch (error) {
            mostrarErro('Erro de conexão com o servidor');
        }
    });

    function mostrarErro(mensagem) {
        const alert = document.getElementById('alertErro');
        alert.textContent = mensagem;
        alert.classList.remove('d-none');
    }

    function mostrarSucesso(mensagem) {
        const alert = document.getElementById('alertSucesso');
        alert.textContent = mensagem;
        alert.classList.remove('d-none');
    }
</script>
</body>
</html>
